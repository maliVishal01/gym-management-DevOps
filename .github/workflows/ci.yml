name: Gym DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Django Check
      run: |
        python manage.py check

    - name: Build Docker Image
      run: |
        docker build -t gym-management-devops .

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/gym-management-DevOps
          git pull origin main
          sudo systemctl restart docker
          docker stop gym-container || true
          docker rm gym-container || true
          docker build -t gym-management-devops .
          docker run -d -p 8000:8000 --name gym-container gym-management-devops
